<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Title & Meta Tags -->
    <title>Vistaro — UK Local Job Matching Platform | vistaro.co.uk</title>
    <meta name="title" content="Vistaro — UK Local Job Matching Platform | vistaro.co.uk" />
    <meta name="description" content="Vistaro (vistaro.co.uk) is the premier UK job platform connecting university students with verified local employers for part-time, flexible jobs across London, Manchester, Birmingham, and the UK." />
    <meta name="keywords" content="Vistaro, vistaro.co.uk, student jobs UK, part-time jobs UK, local hiring UK, student recruitment London, job matching platform, UK university jobs" />
    <meta name="author" content="Vistaro UK" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://vistaro.co.uk/" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vistaro" />
    <meta property="og:url" content="https://vistaro.co.uk/" />
    <meta property="og:title" content="Vistaro — UK Local Job Matching Platform | vistaro.co.uk" />
    <meta property="og:description" content="Discover flexible, student-friendly part-time jobs across the UK or hire verified local student talent at vistaro.co.uk." />
    <meta property="og:image" content="https://vistaro.co.uk/logo.jpeg" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://vistaro.co.uk/" />
    <meta name="twitter:title" content="Vistaro — UK Local Job Matching Platform | vistaro.co.uk" />
    <meta name="twitter:description" content="Discover flexible student jobs and local employer hiring at vistaro.co.uk." />
    <meta name="twitter:image" content="https://vistaro.co.uk/logo.jpeg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Structured Data (JSON-LD) for Google Search Engine Optimization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Vistaro",
      "url": "https://vistaro.co.uk",
      "logo": "https://vistaro.co.uk/logo.jpeg",
      "sameAs": [
        "https://vistaro.co.uk"
      ],
      "description": "Vistaro is an admin-mediated local job recruitment and student employment platform operating in the UK."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Vistaro",
      "url": "https://vistaro.co.uk/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://vistaro.co.uk/?keyword={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
